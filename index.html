<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlphaOS</title>
  </head>
  <body>
    <div class="fixed inset-0 z-[-4] bg-[var(--bg)] transition-colors duration-300"></div>
    <div id="custom-bg" class="fixed inset-0 z-[-3] bg-cover bg-center bg-no-repeat transition-opacity duration-500 opacity-0"></div>
    <canvas id="stars-canvas" class="fixed inset-0 z-[-2] pointer-events-none w-full h-full opacity-100"></canvas>
    <div id="loading-screen" class="fixed inset-0 z-[100] bg-[var(--bg)] flex flex-col items-center justify-center font-display transition-opacity duration-500">
      <div class="w-16 h-16 border-4 border-[var(--border)] border-t-[var(--accent)] rounded-full animate-spin mb-6"></div>
      <h1 class="text-5xl font-bold tracking-tighter uppercase mb-2">Alpha<span class="accent-text">OS</span></h1>
      <p class="text-sm font-mono opacity-80">Loading system modules...</p>
    </div>
    <div id="app" class="min-h-screen pb-14">
      <!-- Header -->
      <header class="sticky top-0 z-10 border-b border-[var(--border)] bg-[var(--bg)]/80 backdrop-blur-md px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
          <div id="logo" class="flex items-center gap-2 cursor-pointer">
            <div class="w-10 h-10 accent-bg rounded-lg flex items-center justify-center text-white font-bold text-xl">A</div>
            <h1 class="hidden sm:block text-xl font-display font-bold tracking-tighter uppercase">Alpha<span class="accent-text">OS</span></h1>
          </div>

          <div class="flex-1 max-w-xl relative">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 opacity-50 text-[var(--text)]"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input
              type="text"
              id="search-input"
              placeholder="Search for a game..."
              class="w-full bg-[var(--surface)] border border-[var(--border)] rounded-full py-2 pl-10 pr-4 outline-none focus:ring-2 focus:ring-[var(--accent)]/50 transition-all text-[var(--text)]"
            />
          </div>

          <button 
            id="settings-btn"
            class="p-2 hover:bg-[var(--surface)] rounded-full transition-colors border border-transparent hover:border-[var(--border)]"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings w-5 h-5"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.17a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </header>

      <!-- Funny Text -->
      <div class="max-w-7xl mx-auto px-6 pt-6 pb-2 text-center h-16 flex items-center justify-center">
        <p id="funny-text" class="text-sm md:text-lg font-mono font-medium accent-text transition-opacity duration-500"></p>
      </div>

      <!-- Main Game Grid -->
      <main id="game-grid-container" class="max-w-7xl mx-auto px-6 pb-8 view-section">
        <div id="game-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 border border-[var(--border)] backdrop-blur-sm bg-black/20 rounded-3xl p-6">
          <!-- Games injected here -->
        </div>
        <div id="no-results" class="hidden text-center py-20 opacity-50">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search w-12 h-12 mx-auto mb-4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <p class="text-xl">No games found matching your search.</p>
        </div>
      </main>

      <!-- Apps Grid -->
      <main id="app-grid-container" class="max-w-7xl mx-auto px-6 pb-8 view-section hidden">
        <h2 class="text-3xl font-display font-bold tracking-tighter mb-4 px-2">Apps</h2>
        <div id="app-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 border border-[var(--border)] backdrop-blur-sm bg-black/20 rounded-3xl p-6">
          <!-- Apps injected here -->
        </div>
      </main>

      <!-- Game Viewer Overlay -->
      <div id="game-viewer" class="fixed inset-0 z-50 bg-[var(--bg)] hidden flex-col">
        <div class="flex items-center justify-between p-4 border-b border-[var(--border)]">
          <div class="flex items-center gap-4">
            <button id="close-game" class="p-2 hover:bg-[var(--surface)] rounded-lg transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x w-6 h-6"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
            <h2 id="viewer-title" class="text-xl font-bold font-display">Game Title</h2>
          </div>
          <div class="flex items-center gap-2">
            <button id="fullscreen-btn" class="p-2 hover:bg-[var(--surface)] rounded-lg transition-colors" title="Fullscreen">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-maximize w-5 h-5"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
            </button>
          </div>
        </div>
        <div class="flex-1 bg-black overflow-hidden relative">
          <iframe
            id="game-iframe"
            class="absolute inset-0 w-full h-full border-none"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
            sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-scripts allow-same-origin"
            allowfullscreen
          ></iframe>
        </div>
      </div>

      <!-- Settings Modal -->
      <div id="settings-modal" class="fixed inset-0 z-[60] hidden">
        <div id="modal-overlay" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md p-6">
          <div class="bg-[var(--bg)] border border-[var(--border)] rounded-3xl shadow-2xl p-8">
            <div class="flex items-center justify-between mb-8">
              <h2 class="text-2xl font-display font-bold">Settings</h2>
              <button id="close-settings" class="p-2 hover:bg-[var(--surface)] rounded-full text-[var(--text)]">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x w-6 h-6"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </div>

            <div class="space-y-8">
              <!-- Theme Selector -->
              <section>
                <label class="block text-sm font-bold uppercase tracking-wider opacity-50 mb-4">Aesthetic Theme</label>
                <div class="grid grid-cols-2 gap-3" id="theme-options">
                  <button data-theme="light" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Light</button>
                  <button data-theme="dark" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Dark</button>
                  <button data-theme="retro" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Retro</button>
                  <button data-theme="cyberpunk" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Cyberpunk</button>
                  <button data-theme="sakura" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Sakura</button>
                  <button data-theme="ocean" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Ocean</button>
                  <button data-theme="forest" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Forest</button>
                  <button data-theme="sunset" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Sunset</button>
                  <button data-theme="midnight" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Midnight</button>
                  <button data-theme="neon" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Neon</button>
                  <button data-theme="halloween" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Halloween</button>
                  <button data-theme="winter" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Winter</button>
                  <button data-theme="dessert" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Dessert</button>
                  <button data-theme="obsidian" class="theme-btn px-4 py-3 rounded-xl border-2 border-[var(--border)] bg-[var(--surface)] hover:border-[var(--accent)]/50 transition-all capitalize font-medium text-[var(--text)]">Obsidian</button>
                </div>
              </section>

              <!-- Custom Background -->
              <section class="mt-6">
                <label class="block text-sm font-bold uppercase tracking-wider opacity-50 mb-2">Custom Background URL</label>
                <div class="flex gap-2">
                  <input type="text" id="bg-url-input" class="flex-1 bg-[var(--surface)] border border-[var(--border)] rounded-xl px-4 py-2 text-[var(--text)] outline-none focus:border-[var(--accent)] transition-colors" placeholder="https://example.com/image.jpg">
                  <button id="apply-bg-btn" class="px-4 py-2 bg-[var(--accent)] text-white rounded-xl font-medium hover:opacity-90 transition-opacity">Apply</button>
                </div>
                <button id="reset-bg-btn" class="mt-2 text-sm text-[var(--accent)] hover:underline">Reset to Default Space Background</button>
              </section>

              <!-- Tab Cloak Toggle -->
              <section class="flex items-center justify-between">
                <div>
                  <h3 class="font-bold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-check w-5 h-5 accent-text"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>
                    Tab Cloak
                  </h3>
                  <p class="text-xs opacity-60">Disguise this tab as Google Docs</p>
                </div>
                <button
                  id="cloak-toggle"
                  class="w-14 h-8 rounded-full relative bg-gray-400 transition-colors duration-300"
                >
                  <div class="dot absolute top-1 left-1 w-6 h-6 bg-white rounded-full shadow-md transition-transform duration-300"></div>
                </button>
              </section>
            </div>

            <button 
              id="save-settings"
              class="w-full mt-10 p-4 accent-bg text-white rounded-2xl font-bold hover:brightness-110 transition-all shadow-lg active:scale-95"
            >
              Save & Close
            </button>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer id="main-footer" class="max-w-7xl mx-auto px-6 py-12 border-t border-[var(--border)] opacity-50 text-sm flex flex-col sm:flex-row justify-between items-center gap-4">
        <p>&copy; 2026 AlphaOS. All games are property of their respective owners.</p>
        <div class="flex gap-6">
          <button class="hover:accent-text transition-colors">Privacy Policy</button>
          <button class="hover:accent-text transition-colors">Terms of Service</button>
        </div>
      </footer>
    </div>

    <!-- Taskbar -->
    <div id="taskbar" class="fixed bottom-0 left-0 right-0 h-14 bg-black/50 backdrop-blur-xl border-t border-white/10 z-[200] flex items-center px-4 gap-2">
      <button id="start-btn" class="h-10 px-4 rounded-md hover:bg-white/10 transition-colors flex items-center gap-2 font-display font-bold text-white">
        <div class="w-6 h-6 bg-[var(--accent)] rounded-sm flex items-center justify-center text-white text-xs">A</div>
        Start
      </button>
      <div class="h-8 w-px bg-white/20 mx-2"></div>
      <button id="tb-games-btn" class="h-10 px-4 rounded-md hover:bg-white/10 transition-colors flex items-center gap-2 text-white/90">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><rect width="20" height="12" x="2" y="6" rx="2"/></svg>
        Games
      </button>
      <button id="tb-apps-btn" class="h-10 px-4 rounded-md hover:bg-white/10 transition-colors flex items-center gap-2 text-white/90">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
        Apps
      </button>
      <button id="tb-themes-btn" class="h-10 px-4 rounded-md hover:bg-white/10 transition-colors flex items-center gap-2 text-white/90">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
        Themes
      </button>
      <div class="flex-1"></div>
      <div id="tb-clock" class="text-sm font-mono opacity-80 px-4 text-white"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
